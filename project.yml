# XcodeGen spec for ASFW.xcodeproj — the pbxproj is GENERATED from this file.
# Edit this spec (never the pbxproj), then run `xcodegen generate` (build.sh
# does it automatically) and commit the regenerated project alongside it.
#
# Fidelity notes (mirrors the hand-maintained project this replaced):
# - Dext entitlements are selected via nested variable expansion:
#   CODE_SIGN_ENTITLEMENTS = $(ASFW_DEXT_ENTITLEMENTS_$(ASFW_ENABLE_SCSI)).
#   `./build.sh --scsi` flips ASFW_ENABLE_SCSI=YES on the xcodebuild command
#   line, which also enables the #if ASFW_ENABLE_SCSI personality in
#   ASFWDriver/Info.plist through INFOPLIST_PREPROCESS.
# - The app has no Info.plist file on purpose (GENERATE_INFOPLIST_FILE=YES);
#   do not add an `info:` block to the ASFW target.
# - ASFWDriver/Info.plist is excluded from sources: it is consumed via
#   INFOPLIST_FILE and contains C-preprocessor directives.
name: ASFW
options:
  minimumXcodeGenVersion: "2.44.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true
  settingPresets: none

configs:
  Debug: debug
  Release: release

packages:
  swift-sdk:
    url: https://github.com/modelcontextprotocol/swift-sdk.git
    majorVersion: 0.11.0

fileGroups:
  - ASFW.xctestplan
  - bump.sh

settings:
  base:
    ALWAYS_SEARCH_USER_PATHS: NO
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    CLANG_ANALYZER_NONNULL: YES
    CLANG_ANALYZER_NUMBER_OBJECT_CONVERSION: YES_AGGRESSIVE
    CLANG_CXX_LANGUAGE_STANDARD: gnu++20
    CLANG_ENABLE_MODULES: YES
    CLANG_ENABLE_OBJC_ARC: YES
    CLANG_ENABLE_OBJC_WEAK: YES
    CLANG_WARN_BLOCK_CAPTURE_AUTORELEASING: YES
    CLANG_WARN_BOOL_CONVERSION: YES
    CLANG_WARN_COMMA: YES
    CLANG_WARN_CONSTANT_CONVERSION: YES
    CLANG_WARN_DEPRECATED_OBJC_IMPLEMENTATIONS: YES
    CLANG_WARN_DIRECT_OBJC_ISA_USAGE: YES_ERROR
    CLANG_WARN_DOCUMENTATION_COMMENTS: YES
    CLANG_WARN_EMPTY_BODY: YES
    CLANG_WARN_ENUM_CONVERSION: YES
    CLANG_WARN_INFINITE_RECURSION: YES
    CLANG_WARN_INT_CONVERSION: YES
    CLANG_WARN_NON_LITERAL_NULL_CONVERSION: YES
    CLANG_WARN_OBJC_IMPLICIT_RETAIN_SELF: YES
    CLANG_WARN_OBJC_LITERAL_CONVERSION: YES
    CLANG_WARN_OBJC_ROOT_CLASS: YES_ERROR
    CLANG_WARN_QUOTED_INCLUDE_IN_FRAMEWORK_HEADER: YES
    CLANG_WARN_RANGE_LOOP_ANALYSIS: YES
    CLANG_WARN_STRICT_PROTOTYPES: YES
    CLANG_WARN_SUSPICIOUS_MOVE: YES
    CLANG_WARN_UNGUARDED_AVAILABILITY: YES_AGGRESSIVE
    CLANG_WARN_UNREACHABLE_CODE: YES
    CLANG_WARN__DUPLICATE_METHOD_MATCH: YES
    COPY_PHASE_STRIP: NO
    DEVELOPMENT_TEAM: F6YA6B56LR
    ENABLE_STRICT_OBJC_MSGSEND: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GCC_C_LANGUAGE_STANDARD: gnu17
    GCC_NO_COMMON_BLOCKS: YES
    GCC_WARN_64_TO_32_BIT_CONVERSION: YES
    GCC_WARN_ABOUT_RETURN_TYPE: YES_ERROR
    GCC_WARN_UNDECLARED_SELECTOR: YES
    GCC_WARN_UNINITIALIZED_AUTOS: YES_AGGRESSIVE
    GCC_WARN_UNUSED_FUNCTION: YES
    GCC_WARN_UNUSED_VARIABLE: YES
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    MTL_FAST_MATH: YES
    SDKROOT: macosx
  configs:
    Debug:
      DEBUG_INFORMATION_FORMAT: dwarf
      ENABLE_TESTABILITY: YES
      GCC_DYNAMIC_NO_PIC: NO
      GCC_OPTIMIZATION_LEVEL: 0
      GCC_PREPROCESSOR_DEFINITIONS: ["DEBUG=1", "$(inherited)"]
      MTL_ENABLE_DEBUG_INFO: INCLUDE_SOURCE
      ONLY_ACTIVE_ARCH: YES
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG $(inherited)"
      SWIFT_OPTIMIZATION_LEVEL: -Onone
    Release:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      ENABLE_NS_ASSERTIONS: NO
      MTL_ENABLE_DEBUG_INFO: NO
      SWIFT_COMPILATION_MODE: wholemodule

targets:
  ASFWDriver:
    type: com.apple.product-type.driver-extension
    platform: macOS
    sources:
      - path: ASFWDriver
        excludes:
          - "Info.plist"
          - "**/*.md"
          - "**/*.bak*"
          - "fixlog.sh"
          - ".claude"
          - ".claude/**"
          # Generated by bump.sh and gitignored — must stay out of the project
          # so generation gives the same pbxproj whether or not it exists
          # (fresh checkouts / CI don't have it).
          - "Version/DriverVersion.hpp"
    preBuildScripts:
      - name: Bump Version
        shell: /bin/sh
        basedOnDependencyAnalysis: false
        script: |
          ls ${SRCROOT}
          $SRCROOT/bump.sh
    settings:
      base:
        SDKROOT: driverkit
        DRIVERKIT_DEPLOYMENT_TARGET: "25.0"
        PRODUCT_NAME: net.mrmidi.ASFW.ASFWDriver
        PRODUCT_BUNDLE_IDENTIFIER: net.mrmidi.ASFW.ASFWDriver
        AD_HOC_CODE_SIGNING_ALLOWED: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: F6YA6B56LR
        ASFW_ENABLE_SCSI: NO
        ASFW_DEXT_ENTITLEMENTS_NO: ASFWDriver/ASFWDriver.entitlements
        ASFW_DEXT_ENTITLEMENTS_YES: ASFWDriver/ASFWDriver+SCSI.entitlements
        CODE_SIGN_ENTITLEMENTS: $(ASFW_DEXT_ENTITLEMENTS_$(ASFW_ENABLE_SCSI))
        ASFW_INFOPLIST_DEFS_NO: ""
        ASFW_INFOPLIST_DEFS_YES: ASFW_ENABLE_SCSI=1
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: ASFWDriver/Info.plist
        INFOPLIST_PREPROCESS: YES
        INFOPLIST_OTHER_PREPROCESSOR_FLAGS: -traditional
        INFOPLIST_PREPROCESSOR_DEFINITIONS: $(ASFW_INFOPLIST_DEFS_$(ASFW_ENABLE_SCSI))
        CLANG_CXX_LANGUAGE_STANDARD: gnu++23
        CLANG_ENABLE_MODULES: YES
        EXCLUDED_SOURCE_FILE_NAMES: "*.md"
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SDKROOT)/System/DriverKit/System/Library/Frameworks"
        LIBRARY_SEARCH_PATHS: "$(inherited)"
        OTHER_LDFLAGS: "-framework DriverKit -framework PCIDriverKit -framework AudioDriverKit -framework SCSIControllerDriverKit"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        RUN_CLANG_STATIC_ANALYZER: YES
        SKIP_INSTALL: YES
        STRING_CATALOG_GENERATE_SYMBOLS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        SWIFT_VERSION: "6.0"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: -Onone

  ASFW:
    type: application
    platform: macOS
    sources:
      - path: ASFW
    dependencies:
      - target: ASFWDriver
        embed: true
        codeSign: false
      - package: swift-sdk
        product: MCP
    settings:
      base:
        PRODUCT_NAME: $(TARGET_NAME)
        PRODUCT_BUNDLE_IDENTIFIER: net.mrmidi.ASFW
        AD_HOC_CODE_SIGNING_ALLOWED: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: fwicons
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: ASFW/App.entitlements
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
        COMBINE_HIDPI_IMAGES: YES
        CURRENT_PROJECT_VERSION: 1
        DEVELOPMENT_TEAM: F6YA6B56LR
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_PREVIEWS: YES
        ENABLE_USER_SELECTED_FILES: readonly
        GENERATE_INFOPLIST_FILE: YES
        HEADER_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/ASFWDriver/Shared"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
        MARKETING_VERSION: "1.0"
        REGISTER_APP_GROUPS: YES
        STRING_CATALOG_GENERATE_SYMBOLS: YES
        SWIFT_APPROACHABLE_CONCURRENCY: YES
        SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
        SWIFT_EMIT_LOC_STRINGS: YES
        SWIFT_OBJC_BRIDGING_HEADER: ASFW/ASFW-Bridging-Header.h
        SWIFT_UPCOMING_FEATURE_MEMBER_IMPORT_VISIBILITY: YES
        SWIFT_VERSION: "5.0"

  ASFWTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ASFWTests
    dependencies:
      - target: ASFW
        link: false
      - package: swift-sdk
        product: MCP
    settings:
      base:
        PRODUCT_NAME: $(TARGET_NAME)
        PRODUCT_BUNDLE_IDENTIFIER: net.mrmidi.ASFWTests
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/ASFW.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/ASFW
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: F6YA6B56LR
        GENERATE_INFOPLIST_FILE: YES
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
        STRING_CATALOG_GENERATE_SYMBOLS: NO
        SWIFT_APPROACHABLE_CONCURRENCY: YES
        SWIFT_EMIT_LOC_STRINGS: NO
        SWIFT_UPCOMING_FEATURE_MEMBER_IMPORT_VISIBILITY: YES
        SWIFT_VERSION: "5.0"

schemes:
  ASFW:
    build:
      targets:
        ASFW: all
    run:
      config: Debug
    test:
      config: Debug
      testPlans:
        - path: ASFW.xctestplan
          defaultPlan: true
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
      revealArchiveInOrganizer: true
  ASFWDriver:
    build:
      targets:
        ASFWDriver: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
